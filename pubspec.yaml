name: driver_optimizer
description: Aplikasi monitor koneksi & GPS untuk driver ojek online.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  connectivity_plus: ^6.1.5
  geolocator: ^11.0.0
  geolocator_android: ^4.6.2
  flutter_foreground_task: 8.8.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  battery_plus: ^6.1.0
  app_settings: ^5.1.1
  # Untuk ping digunakan InternetAddress dari dart:io, sudah tersedia.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true