name: driver_optimizer
description: Aplikasi monitor koneksi & GPS untuk driver ojek online.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  connectivity_plus: ^6.1.5
  geolocator: ^11.0.0
  geolocator_android: ^4.6.1
  flutter_foreground_task: 8.8.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  battery_plus: ^6.1.0
  app_settings: ^5.1.1
  wakelock_plus: ^1.2.0   # untuk layar tetap menyala
  permission_handler: ^11.3.1     # untuk izin yang lebih baik
  flutter_secure_storage: ^9.2.4   # penyimpanan data sensitifflutter
  device_info_plus: ^10.1.0   # versi terbaru
  # Untuk ping digunakan InternetAddress dari dart:io, sudah tersedia.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/splash/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"  
  # Ganti dengan path ikon Anda
  adaptive_icon_background: "#121212"      
  # Warna latar untuk Android adaptive icon (opsional)
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png" 
  # Jika ingin ikon depan terpisah (opsional)

flutter_native_splash:
  color: "#121212"              # Warna latar belakang splash (sesuai tema gelap)
  image: "assets/splash/logo.png"  
  # Logo di tengah (ukuran recommended 512×512)
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true